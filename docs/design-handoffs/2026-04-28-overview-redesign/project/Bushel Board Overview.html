<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Bushel Board — Overview Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; background: #d6cfb8; font-family: "DM Sans", system-ui, sans-serif; }
  * { box-sizing: border-box; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="us-paths.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="direction-a.jsx"></script>
<script type="text/babel" src="direction-b.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="editorial" title="Direction A — Editorial / Quiet Confidence" subtitle="Wheat palette, Fraunces display, considered whitespace. Stays close to current brand and elevates it.">
          <DCArtboard id="a-desktop" label="Desktop · 1280" width={1280} height={2080}>
            <window.DirectionADesktop />
          </DCArtboard>
          <DCArtboard id="a-mobile" label="Mobile · 390" width={390} height={1620}>
            <window.DirectionAMobile />
          </DCArtboard>
        </DCSection>

        <DCSection id="terminal" title="Direction B — Bold Predictive Terminal" subtitle="Dark, dense, Polymarket × Bloomberg. Mono numerals, live ticker, big stance score.">
          <DCArtboard id="b-desktop" label="Desktop · 1280" width={1280} height={2200}>
            <window.DirectionBDesktop />
          </DCArtboard>
          <DCArtboard id="b-mobile" label="Mobile · 390" width={390} height={1720}>
            <window.DirectionBMobile />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
