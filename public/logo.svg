<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
  <!-- Definitions for gradients and reusable elements -->
  <defs>
    <!-- Organic Wheat Gradient (Golden/Amber) -->
    <linearGradient id="wheatGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#D4A017" /> <!-- Deeper amber at base -->
      <stop offset="50%" stop-color="#F3E5AB" /> <!-- Lighter wheat color in middle -->
      <stop offset="100%" stop-color="#E5C77F" /> <!-- Golden tip -->
    </linearGradient>

    <!-- Digital Data Gradient (Teal/Cyan) -->
    <linearGradient id="dataGradient" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#008080" /> <!-- Deep teal base -->
      <stop offset="50%" stop-color="#20B2AA" /> <!-- Light sea green middle -->
      <stop offset="100%" stop-color="#00FFFF" /> <!-- Bright cyan tip -->
    </linearGradient>

    <!-- Node Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <g transform="translate(200, 130)"> <!-- Centered above text -->
    
    <!-- Central Stalk (Transitioning from organic brown to digital teal) -->
    <line x1="0" y1="60" x2="0" y2="0" stroke="#8B6508" stroke-width="4" stroke-linecap="round" />
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#008080" stroke-width="4" stroke-dasharray="8,4" stroke-linecap="round" />

    <!-- ORGANIC LEFT SIDE (Wheat Kernels) -->
    <g fill="url(#wheatGradient)" stroke="#8B6508" stroke-width="1.5">
      <!-- Bottom Kernel -->
      <path d="M-4,40 C-15,40 -20,30 -20,20 C-10,20 -4,25 -4,40 Z" />
      <path d="M-20,20 C-22,15 -25,12 -30,10" fill="none" class="awn" />
      
      <!-- Middle-Bottom Kernel -->
      <path d="M-4,25 C-15,25 -20,15 -20,5 C-10,5 -4,10 -4,25 Z" />
      <path d="M-20,5 C-22,0 -25,-3 -30,-5" fill="none" class="awn" />

      <!-- Middle Kernel -->
      <path d="M-4,10 C-15,10 -20,0 -20,-10 C-10,-10 -4,-5 -4,10 Z" />
      <path d="M-20,-10 C-22,-15 -25,-18 -30,-20" fill="none" class="awn" />

      <!-- Top Kernel -->
      <path d="M-4,-5 C-15,-5 -20,-15 -20,-25 C-10,-25 -4,-20 -4,-5 Z" />
      <path d="M-20,-25 C-22,-30 -25,-33 -30,-35" fill="none" class="awn" />
    </g>

    <!-- DIGITAL RIGHT SIDE (Data Nodes) -->
    <g stroke="url(#dataGradient)" stroke-width="2" fill="none">
      <!-- Bottom Data Branch -->
      <path d="M4,30 L15,30 L20,20" />
      <circle cx="20" cy="20" r="3" fill="#00FFFF" stroke="none" filter="url(#glow)" />
      
      <!-- Middle-Bottom Data Branch -->
      <path d="M4,15 L15,15 L20,5" />
      <circle cx="20" cy="5" r="3" fill="#00FFFF" stroke="none" filter="url(#glow)" />

      <!-- Middle Data Branch -->
      <path d="M4,0 L15,0 L20,-10 L25,-15" />
      <circle cx="25" cy="-15" r="4" fill="#00FFFF" stroke="none" filter="url(#glow)" />

      <!-- Top Data Branch -->
      <path d="M4,-15 L15,-15 L20,-25 L15,-35" />
      <polyline points="15,-35 15,-45 25,-45" stroke-dasharray="2,2" />
      <rect x="23" y="-47" width="4" height="4" fill="#00FFFF" stroke="none" filter="url(#glow)" />
      
      <!-- Topmost Node on central stalk -->
       <circle cx="0" cy="-65" r="3.5" fill="#00FFFF" stroke="none" filter="url(#glow)" />
    </g>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 240)" text-anchor="middle">
    <!-- Main Title -->
    <text x="0" y="0" font-family="'Inter', 'Segoe UI', sans-serif" font-size="28" font-weight="800" fill="#2C3E50" letter-spacing="1.5">
      BUSHEL BOARD
    </text>
    
    <!-- Subtitle -->
    <text x="0" y="22" font-family="'Inter', 'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#008080" letter-spacing="3">
      TRADE INSIGHT
    </text>

    <!-- Connecting Dots -->
    <circle cx="-65" cy="18" r="1.5" fill="#D4A017" />
    <circle cx="65" cy="18" r="1.5" fill="#00FFFF" />
  </g>
</svg>
